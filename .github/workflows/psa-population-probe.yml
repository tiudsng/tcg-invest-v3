name: PSA Population Probe
on:
  workflow_dispatch:
  repository_dispatch:
    types: [psa-population-probe]
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: |
          npm ci --include=dev 2>&1 | tail -10
          echo "--- node_modules check ---"
          ls node_modules | grep -E "^puppeteer" || echo "NOT FOUND"

      - name: Run PSA population scraper
        run: node scripts/psa_population_probe.cjs
        env:
          NODE_OPTIONS: --max-old-space-size=512
