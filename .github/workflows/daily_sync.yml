name: TCG Invest — Daily Market Sync

on:
  schedule:
    # HKT 04:00 = UTC 20:00
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (不寫入 Firestore)'
        required: false
        default: 'false'
        type: boolean
      limit:
        description: 'Limit N cards (測試用，預設全量)'
        required: false
        type: number

jobs:
  sync_snkrdunk:
    name: SNKRDUNK Price Sync
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: /home/runner/work/tcg-invest-v3/tcg-invest-v3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm packages
        run: npm install

      - name: Run SNKRDUNK scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p /home/runner/.hermes/firebase
          echo "$FIREBASE_SERVICE_ACCOUNT" > /home/runner/.hermes/firebase/gen-lang-client-0326385388-firebase-adminsdk.json

          ARGS=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="--dry-run"
          elif [ "${{ inputs.limit }}" != "" ]; then
            ARGS="--limit=${{ inputs.limit }}"
          fi

          node scripts/scraper_snkrdunk.cjs $ARGS

      - name: Upload scrape log
        if: always()
        run: echo "snkrdunk_last_run=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  sync_pokeca:
    name: Pokeca-Chart PSA Sync
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: /home/runner/work/tcg-invest-v3/tcg-invest-v3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm packages
        run: npm install

      - name: Run Pokeca scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p /home/runner/.hermes/firebase
          echo "$FIREBASE_SERVICE_ACCOUNT" > /home/runner/.hermes/firebase/gen-lang-client-0326385388-firebase-adminsdk.json
          node scripts/scraper_pokeca.cjs

      - name: Upload scrape log
        if: always()
        run: echo "pokeca_last_run=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY