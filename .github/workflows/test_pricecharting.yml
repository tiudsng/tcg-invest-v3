name: Test PriceCharting
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test curl_cffi
        run: |
          pip install curl_cffi -q
          python3 -c "
from curl_cffi import requests
r = requests.get('https://www.pricecharting.com', impersonate='chrome120', timeout=15)
print('Status:', r.status_code)
print('Cloudflare:', 'Cloudflare' in r.text)
"
      - name: Test raw curl
        run: |
          STATUS=$(curl -s -L -o /tmp/pc_test.txt -w "%{http_code}" https://www.pricecharting.com)
          echo "HTTP Status: $STATUS"
          grep -o "Cloudflare" /tmp/pc_test.txt | head -1 || echo "No Cloudflare"
