name: JPY Rate Alert
on:
  schedule:
    # HKT 04:00, 08:00, 12:00, 16:00, 20:00, 00:00 = UTC 20:00, 00:00, 04:00, 08:00, 12:00, 16:00
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'JPY/HKD threshold (default 0.050)'
        required: false
        default: '0.050'
        type: string
  repository_dispatch:
    types: [jpy-alert]

jobs:
  jpy-alert:
    name: JPY Rate Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run JPY Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JPY_THRESHOLD: ${{ inputs.threshold || '0.050' }}
        run: python3 scripts/jpy_monitor.py

      - name: Post summary
        run: |
          echo "JPY alert check complete at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
